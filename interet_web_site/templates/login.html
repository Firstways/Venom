<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-box {
            background-color: #1e293b;
            border-radius: 12px;
            padding: 40px;
            width: 360px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        input {
            background-color: #334155;
            border: none;
            color: white;
        }
        input:focus {
            background-color: #334155;
            color: white;
            box-shadow: 0 0 0 2px #38bdf8;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h4 class="mb-4 text-center">🔒 Accès sécurisé</h4>
        <form method="POST">
            <div class="mb-3">
                <input type="password" name="password" class="form-control" placeholder="Mot de passe" autofocus>
            </div>
            {% if error %}
                <div class="alert alert-danger py-1 px-2 mb-3" style="font-size:14px;">{{ error }}</div>
            {% endif %}
            <button type="submit" class="btn btn-info w-100">Connexion</button>
        </form>
    </div>
</body>
</html>
